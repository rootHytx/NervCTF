name: "Challenge Name"
author: "author"
category: misc
description: |
    Describe the challenge here.

    Connect with: `nc <host> <port>`
value: 100
type: instance
state: visible

instance:
    backend: vagrant
    vagrantfile: /opt/challenges/challenge-name/vagrant
    internal_port: 4000
    connection: nc

    # Random per-team flag — the Vagrant backend does not yet inject FLAG
    # automatically. When implemented, the flag will be passed via vagrant ssh
    # or a provisioning trigger. See instance/vagrant.rs for extension points.
    flag_mode: random
    flag_prefix: "CTF{"
    flag_suffix: "}"
    random_flag_length: 16

    timeout_minutes: 60
    # max_renewals: 2

# Dynamic scoring (optional)
# extra:
#     initial: 500
#     decay: 100
#     minimum: 50

tags:
    - tag1

version: "0.3"
