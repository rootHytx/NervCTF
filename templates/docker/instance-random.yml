name: "Challenge Name"
author: "author"
category: pwn   # web, pwn, rev, crypto, forensics, misc, ...
description: |
    Describe the challenge here.

    Connect with: `nc <host> <port>`
value: 100
type: instance
state: visible

instance:
    backend: docker
    image: .
    internal_port: 4000
    connection: nc  # nc | http | ssh

    # Random per-team flag: the monitor generates a unique flag and passes it
    # to the container as the FLAG environment variable.
    flag_mode: random
    flag_prefix: "CTF{"
    flag_suffix: "}"
    random_flag_length: 16  # length of the random alphanumeric part

    # Write FLAG to disk then clear it from the environment.
    # IMPORTANT: use `unset FLAG`, NOT `unset $FLAG`.
    # `unset $FLAG` expands the flag value as a variable name — almost certainly a no-op.
    command: "/bin/sh -c 'echo $FLAG > /challenge/flag && unset FLAG && exec /challenge/binary'"

    timeout_minutes: 45
    # max_renewals: 3

# Dynamic scoring (optional)
# extra:
#     initial: 500
#     decay: 100
#     minimum: 50
#     # decay_function: logarithmic

# No flags list needed — the monitor generates and verifies flags at runtime.
# flags:

tags:
    - tag1

# files:
#     - dist/challenge.zip

# hints:
#     - { content: "Hint text here", cost: 50 }

version: "0.3"
