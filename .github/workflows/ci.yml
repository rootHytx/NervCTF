name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Check nervctf
        run: cargo check -p nervctf
      - name: Check remote-monitor
        run: cargo check -p remote-monitor
      - name: Run tests
        run: cargo test --workspace
