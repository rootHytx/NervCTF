---
- hosts: ctfd
  become: yes
  vars:
    ansible_python_interpreter: auto_silent
    docker_user: docker
    monitor_port: "{{ monitor_port | default('33133') }}"

  tasks:
    # ── Docker ─────────────────────────────────────────────────────────────────
    - name: Check if Docker is installed
      command: docker --version
      register: docker_installed
      changed_when: false
      ignore_errors: yes

    - name: Install Docker
      when: docker_installed.rc != 0
      block:
        - name: Install apt prerequisites
          apt:
            name: [ca-certificates, curl]
            state: present
            update_cache: yes

        - name: Create keyring directory
          file:
            path: /etc/apt/keyrings
            state: directory
            mode: "0755"

        - name: Download Docker GPG key
          get_url:
            url: https://download.docker.com/linux/ubuntu/gpg
            dest: /etc/apt/keyrings/docker.asc
            mode: "0644"
            force: no

        - name: Add Docker apt repository
          apt_repository:
            repo: >-
              deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') }}
              signed-by=/etc/apt/keyrings/docker.asc]
              https://download.docker.com/linux/ubuntu
              {{ ansible_distribution_release }} stable
            filename: docker
            state: present
            update_cache: yes

        - name: Install Docker packages
          apt:
            name:
              - docker-ce
              - docker-ce-cli
              - containerd.io
              - docker-buildx-plugin
              - docker-compose-plugin
            state: present

    # ── Docker user ────────────────────────────────────────────────────────────
    - name: Ensure docker group exists
      group:
        name: docker
        state: present

    - name: Ensure docker user exists
      user:
        name: "{{ docker_user }}"
        groups: docker
        shell: /bin/bash
        state: present
        create_home: yes

    # ── SSH key ────────────────────────────────────────────────────────────────
    - name: Authorize SSH public key for docker user
      authorized_key:
        user: "{{ docker_user }}"
        state: present
        key: "{{ lookup('file', ssh_key) }}"

    # ── CTFd ───────────────────────────────────────────────────────────────────
    - name: Check if CTFd is already cloned
      stat:
        path: "{{ ctfd_path }}/requirements.txt"
      register: ctfd_cloned

    - name: Clone CTFd
      git:
        repo: https://github.com/CTFd/CTFd.git
        dest: "{{ ctfd_path }}"
        version: master
        depth: 1
      become_user: "{{ docker_user }}"
      when: not ctfd_cloned.stat.exists

    - name: Check if CTFd containers are running
      shell: docker compose -f {{ ctfd_path }}/docker-compose.yml ps --status running 2>/dev/null | grep -q ctfd
      register: ctfd_running
      changed_when: false
      ignore_errors: yes
      become_user: "{{ docker_user }}"

    - name: Start CTFd
      command:
        cmd: docker compose up --build --detach --no-recreate
        chdir: "{{ ctfd_path }}"
      become_user: "{{ docker_user }}"
      when: ctfd_running.rc != 0

    # ── LXC / LXD ──────────────────────────────────────────────────────────────
    - name: Check if LXD is installed
      command: lxd --version
      register: lxd_installed
      changed_when: false
      ignore_errors: yes

    - name: Install LXD via snap
      snap:
        name: lxd
        state: present
      when: lxd_installed.rc != 0
      ignore_errors: yes

    - name: Initialize LXD (auto)
      command: lxd init --auto
      when: lxd_installed.rc != 0
      ignore_errors: yes

    - name: Add docker user to lxd group
      user:
        name: "{{ docker_user }}"
        groups: lxd
        append: yes
      ignore_errors: yes

    # ── Vagrant ────────────────────────────────────────────────────────────────
    - name: Check if Vagrant is installed
      command: vagrant --version
      register: vagrant_installed
      changed_when: false
      ignore_errors: yes

    - name: Install Vagrant build deps
      apt:
        name:
          [
            libvirt-daemon-system,
            libvirt-clients,
            qemu-kvm,
            bridge-utils,
            ruby-dev,
          ]
        state: present
        update_cache: yes
      when: vagrant_installed.rc != 0
      ignore_errors: yes

    - name: Add HashiCorp apt key
      get_url:
        url: https://apt.releases.hashicorp.com/gpg
        dest: /etc/apt/keyrings/hashicorp.asc
        mode: "0644"
        force: no
      when: vagrant_installed.rc != 0
      ignore_errors: yes

    - name: Add HashiCorp apt repository
      apt_repository:
        repo: >-
          deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') }}
          signed-by=/etc/apt/keyrings/hashicorp.asc]
          https://apt.releases.hashicorp.com
          {{ ansible_distribution_release }} main
        filename: hashicorp
        state: present
        update_cache: yes
      when: vagrant_installed.rc != 0
      ignore_errors: yes

    - name: Install Vagrant
      apt:
        name: vagrant
        state: present
      when: vagrant_installed.rc != 0
      ignore_errors: yes

    - name: Add docker user to libvirt group
      user:
        name: "{{ docker_user }}"
        groups: libvirt
        append: yes
      ignore_errors: yes

    # ── CTFd Plugin ────────────────────────────────────────────────────────────
    - name: Deploy NervCTF instance plugin to CTFd
      when: plugin_src is defined
      block:
        - name: Ensure CTFd plugins directory exists
          file:
            path: "{{ ctfd_path }}/CTFd/plugins/nervctf_instance"
            state: directory
            owner: "{{ docker_user }}"
            group: docker
            mode: "0755"

        - name: Copy plugin files
          synchronize:
            src: "{{ plugin_src }}/"
            dest: "{{ ctfd_path }}/CTFd/plugins/nervctf_instance/"
            delete: yes
            rsync_opts:
              - "--chown={{ docker_user }}:docker"

    # ── Remote Monitor Docker image ────────────────────────────────────────────
    - name: Ensure remote-monitor directory exists
      file:
        path: "{{ ctfd_path }}/remote-monitor"
        state: directory
        owner: "{{ docker_user }}"
        group: docker
        mode: "0755"
      when: monitor_binary is defined

    - name: Copy remote-monitor binary
      copy:
        src: "{{ monitor_binary }}"
        dest: "{{ ctfd_path }}/remote-monitor/remote-monitor"
        owner: "{{ docker_user }}"
        group: docker
        mode: "0755"
      when: monitor_binary is defined

    - name: Write remote-monitor Dockerfile
      copy:
        content: |
          FROM debian:bookworm-slim
          RUN apt-get update && apt-get install -y --no-install-recommends \
              docker.io ca-certificates libsqlite3-0 && rm -rf /var/lib/apt/lists/*
          COPY remote-monitor /usr/local/bin/remote-monitor
          CMD ["/usr/local/bin/remote-monitor"]
        dest: "{{ ctfd_path }}/remote-monitor/Dockerfile"
        owner: "{{ docker_user }}"
        group: docker
        mode: "0644"
      when: monitor_binary is defined

    - name: Build remote-monitor Docker image
      command: docker build -t nervctf-monitor:latest {{ ctfd_path }}/remote-monitor
      become_user: "{{ docker_user }}"
      when: monitor_binary is defined

    # ── Monitor data directory (bind mount — host path must equal container path
    #    so the host Docker daemon can resolve challenge compose build contexts and
    #    volume paths at the same absolute path the monitor writes them with.)
    - name: Create monitor data directory on host
      file:
        path: "{{ ctfd_path }}/remote-monitor/data/challenges"
        state: directory
        owner: "{{ docker_user }}"
        group: docker
        mode: "0755"

    # ── docker-compose override (monitor service + CTFd env) ───────────────────
    - name: Write docker-compose override
      when: monitor_token is defined
      copy:
        content: |
          services:
            ctfd:
              environment:
                - NERVCTF_MONITOR_URL=http://remote-monitor:{{ monitor_port }}
                - NERVCTF_MONITOR_TOKEN={{ monitor_token }}

            remote-monitor:
              image: nervctf-monitor:latest
              restart: unless-stopped
              environment:
                - CTFD_URL=http://ctfd:8000
                - CTFD_API_KEY={{ ctfd_api_key | default('') }}
                - MONITOR_TOKEN={{ monitor_token }}
                - PUBLIC_HOST={{ ansible_host }}
                - MONITOR_PORT={{ monitor_port }}
                - DB_PATH={{ ctfd_path }}/remote-monitor/data/monitor.db
                - CHALLENGES_BASE_DIR={{ ctfd_path }}/remote-monitor/data/challenges
              volumes:
                - /var/run/docker.sock:/var/run/docker.sock
                - /usr/libexec/docker/cli-plugins:/usr/libexec/docker/cli-plugins:ro
                - {{ ctfd_path }}/remote-monitor/data:{{ ctfd_path }}/remote-monitor/data
              ports:
                - "{{ monitor_port }}:{{ monitor_port }}"
        dest: "{{ ctfd_path }}/docker-compose.override.yml"
        owner: "{{ docker_user }}"
        group: docker
        mode: "0644"

    - name: Apply docker-compose override (recreate CTFd, start monitor)
      command:
        cmd: docker compose up -d --force-recreate
        chdir: "{{ ctfd_path }}"
      become_user: "{{ docker_user }}"
      when: plugin_src is defined or monitor_token is defined
