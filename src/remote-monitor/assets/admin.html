<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NervCTF Monitor Admin</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: monospace; background: #111; color: #ddd; margin: 0; padding: 20px; }
  h1 { color: #eee; font-size: 1.4rem; margin-bottom: 0.2rem; }
  h2 { font-size: 1.1rem; margin: 1.8rem 0 0.5rem; color: #bbb; border-bottom: 1px solid #333; padding-bottom: 4px; }
  #token-info { font-size: 0.8rem; color: #666; margin-bottom: 0.3rem; }
  .status { font-size: 0.8rem; color: #888; margin-bottom: 0.4rem; }
  .section-hdr { display: flex; align-items: baseline; gap: 1rem; }
  .count-badge { font-size: 0.75rem; background: #333; color: #aaa; padding: 1px 6px; border-radius: 2px; }
  #alerts-count-badge { background: #5a2020; color: #ffaaaa; }
  .toolbar {
    display: flex; align-items: center; gap: 0.5rem;
    margin-bottom: 0.4rem; font-size: 0.82rem; flex-wrap: wrap;
  }
  .toolbar label { color: #888; }
  .toolbar select {
    background: #1e1e1e; border: 1px solid #444; color: #ccc;
    padding: 2px 6px; font-family: monospace; font-size: 0.82rem;
  }
  .btn-page {
    background: #1e1e1e; border: 1px solid #444; color: #ccc; cursor: pointer;
    font-family: monospace; font-size: 0.82rem; padding: 2px 10px;
  }
  .btn-page:hover:not(:disabled) { background: #2e2e2e; }
  .btn-page:disabled { opacity: 0.3; cursor: default; }
  .page-info { color: #666; font-size: 0.78rem; min-width: 5rem; text-align: center; }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  th { background: #1e1e1e; color: #aaa; text-align: left; padding: 6px 8px; border-bottom: 1px solid #333; }
  td { padding: 5px 8px; border-bottom: 1px solid #222; vertical-align: top; word-break: break-all; }
  tr:hover td { background: #1a1a1a; }
  .empty { color: #555; font-style: italic; padding: 10px 8px; }
  .badge-ok   { color: #4caf50; }
  .badge-fail { color: #f44; }
  .badge-sharing { color: #ff9800; font-weight: bold; }
  #alerts-section ~ .toolbar select,
  #alerts-section ~ #alerts-table table th,
  #alerts-section ~ #alerts-table table td { background: #1a0a0a; }
  .alert-tbl th { background: #2a1010 !important; }
  .alert-tbl tr:hover td { background: #220e0e !important; }
  .btn-stop {
    background: #6e1a1a; border: none; color: #ffaaaa; cursor: pointer;
    font-family: monospace; font-size: 0.78rem; padding: 2px 8px;
  }
  .btn-stop:hover { background: #9e2a2a; }
  .btn-stop-all {
    background: #7a1e1e; border: 1px solid #a03030; color: #ffaaaa; cursor: pointer;
    font-family: monospace; font-size: 0.82rem; padding: 2px 12px; font-weight: bold;
  }
  .btn-stop-all:hover:not(:disabled) { background: #b03030; }
  .btn-stop-all:disabled { opacity: 0.4; cursor: default; }
  .row-solved { opacity: 0.55; }
  .badge-solved { color: #888; font-size: 0.78rem; }
  /* CTFd links */
  a.cl { color: #7abfff; text-decoration: none; }
  a.cl:hover { text-decoration: underline; }
  /* Toggles */
  .toggle-lbl { color: #666; cursor: pointer; user-select: none; white-space: nowrap; }
  .toggle-lbl input[type=checkbox] { cursor: pointer; accent-color: #7abfff; }
  .sep { color: #444; }
  /* CTFd URL input */
  #ctfd-url-input {
    background: #1e1e1e; border: 1px solid #444; color: #aaa;
    font-family: monospace; font-size: 0.78rem; padding: 2px 6px; width: 15rem;
  }
  #ctfd-url-input::placeholder { color: #555; }
</style>
</head>
<body>

<h1>NervCTF Monitor Admin</h1>
<div id="token-info">Token: (loaded from ?token= param)</div>
<div class="toolbar" style="margin-bottom:0.8rem">
  <label style="color:#666">CTFd URL:</label>
  <input id="ctfd-url-input" type="text" placeholder="http://ctfd-host" oninput="saveCTFdUrl(this.value)">
  <span class="sep">|</span>
  <label class="toggle-lbl"><input type="checkbox" id="links-toggle" onchange="toggleLinks(this)"> &#128279; CTFd Links</label>
</div>
<div class="status" id="last-refresh">Loading...</div>

<!-- ── Flag Sharing Alerts ─────────────────────────────────────────────── -->
<div class="section-hdr" id="alerts-section">
  <h2>Flag Sharing Alerts</h2>
  <span class="count-badge" id="alerts-count-badge">0</span>
</div>
<div class="toolbar">
  <label>Challenge:</label>
  <select id="alerts-challenge" onchange="sectionPageReset('alerts')"><option value="">All</option></select>
  <label>Show:</label>
  <select id="alerts-limit" onchange="sectionPageReset('alerts')">
    <option value="10">10</option><option value="20">20</option>
    <option value="50" selected>50</option><option value="100">100</option><option value="0">All</option>
  </select>
  <button class="btn-page" id="alerts-prev" onclick="sectionPage('alerts',-1)">&#8592; Prev</button>
  <span class="page-info" id="alerts-pageinfo"></span>
  <button class="btn-page" id="alerts-next" onclick="sectionPage('alerts', 1)">Next &#8594;</button>
</div>
<div id="alerts-table"></div>

<!-- ── Active Instances ───────────────────────────────────────────────── -->
<div class="section-hdr">
  <h2>Active Instances</h2>
  <span class="count-badge" id="instances-count">0</span>
</div>
<div class="toolbar">
  <label>Challenge:</label>
  <select id="instances-challenge" onchange="sectionPageReset('instances')"><option value="">All</option></select>
  <label>Show:</label>
  <select id="instances-limit" onchange="sectionPageReset('instances')">
    <option value="10">10</option><option value="20">20</option>
    <option value="50" selected>50</option><option value="100">100</option><option value="0">All</option>
  </select>
  <button class="btn-page" id="instances-prev" onclick="sectionPage('instances',-1)">&#8592; Prev</button>
  <span class="page-info" id="instances-pageinfo"></span>
  <button class="btn-page" id="instances-next" onclick="sectionPage('instances', 1)">Next &#8594;</button>
  <button class="btn-stop-all" id="instances-stop-all" onclick="stopAll()">Stop All</button>
  <span class="sep">|</span>
  <label class="toggle-lbl"><input type="checkbox" id="hide-solved-toggle" onchange="toggleHideSolved(this)"> Hide Solved</label>
</div>
<div id="instances-table"></div>

<!-- ── Correct Solves ─────────────────────────────────────────────────── -->
<div class="section-hdr">
  <h2>Correct Solves</h2>
  <span class="count-badge" id="solves-count">0</span>
</div>
<div class="toolbar">
  <label>Challenge:</label>
  <select id="solves-challenge" onchange="sectionPageReset('solves')"><option value="">All</option></select>
  <label>Show:</label>
  <select id="solves-limit" onchange="sectionPageReset('solves')">
    <option value="10">10</option><option value="20">20</option>
    <option value="50" selected>50</option><option value="100">100</option><option value="0">All</option>
  </select>
  <button class="btn-page" id="solves-prev" onclick="sectionPage('solves',-1)">&#8592; Prev</button>
  <span class="page-info" id="solves-pageinfo"></span>
  <button class="btn-page" id="solves-next" onclick="sectionPage('solves', 1)">Next &#8594;</button>
</div>
<div id="solves-table"></div>

<!-- ── Recent Flag Attempts ───────────────────────────────────────────── -->
<div class="section-hdr">
  <h2>Recent Flag Attempts</h2>
  <span class="count-badge" id="attempts-count">0</span>
</div>
<div class="toolbar">
  <label>Challenge:</label>
  <select id="attempts-challenge" onchange="sectionPageReset('attempts')"><option value="">All</option></select>
  <label>Show:</label>
  <select id="attempts-limit" onchange="sectionPageReset('attempts')">
    <option value="20">20</option><option value="50">50</option>
    <option value="100">100</option><option value="200" selected>200</option><option value="0">All</option>
  </select>
  <button class="btn-page" id="attempts-prev" onclick="sectionPage('attempts',-1)">&#8592; Prev</button>
  <span class="page-info" id="attempts-pageinfo"></span>
  <button class="btn-page" id="attempts-next" onclick="sectionPage('attempts', 1)">Next &#8594;</button>
</div>
<div id="attempts-table"></div>

<script>
(function () {
  var token = '';
  var match = window.location.search.match(/[?&]token=([^&]*)/);
  if (match) {
    token = decodeURIComponent(match[1]);
    document.getElementById('token-info').textContent =
      'Token: ' + (token.length > 6 ? token.slice(0, 6) + '***' : '***');
  } else {
    document.getElementById('token-info').textContent =
      'No token in URL (?token=...) — API calls will fail with 401';
  }

  // ── Persistent settings ───────────────────────────────────────────────────

  var ctfdUrl = localStorage.getItem('ctfd_url') || '';
  var ctfdLinksEnabled = localStorage.getItem('ctfd_links') === '1';
  var hideSolved = localStorage.getItem('hide_solved') === '1';

  document.getElementById('ctfd-url-input').value = ctfdUrl;
  document.getElementById('links-toggle').checked = ctfdLinksEnabled;
  document.getElementById('hide-solved-toggle').checked = hideSolved;

  window.saveCTFdUrl = function(val) {
    ctfdUrl = val.trim();
    localStorage.setItem('ctfd_url', ctfdUrl);
    rerenderAll();
  };

  window.toggleLinks = function(cb) {
    ctfdLinksEnabled = cb.checked;
    localStorage.setItem('ctfd_links', ctfdLinksEnabled ? '1' : '0');
    rerenderAll();
  };

  window.toggleHideSolved = function(cb) {
    hideSolved = cb.checked;
    localStorage.setItem('hide_solved', hideSolved ? '1' : '0');
    renderSection('instances');
  };

  function rerenderAll() {
    renderSection('alerts');
    renderSection('instances');
    renderSection('solves');
    renderSection('attempts');
  }

  // ── HTML helpers ──────────────────────────────────────────────────────────

  function authHeaders() {
    return { 'Authorization': 'Token ' + token, 'Content-Type': 'application/json' };
  }

  function escText(s) {
    if (s === null || s === undefined) return '';
    var d = document.createElement('span');
    d.textContent = String(s);
    return d.innerHTML;
  }

  function nameId(name, id) {
    if (name) return escText(name) + ' <span style="color:#666">(' + escText(id) + ')</span>';
    return escText(id);
  }

  function linkTeam(id, name) {
    var label = nameId(name, id);
    if (!ctfdLinksEnabled || !ctfdUrl || id == null) return label;
    return '<a class="cl" href="' + escText(ctfdUrl) + '/teams/' + encodeURIComponent(id) + '" target="_blank">' + label + '</a>';
  }

  function linkUser(id, name) {
    if (id === null || id === undefined) return '—';
    var label = nameId(name, id);
    if (!ctfdLinksEnabled || !ctfdUrl) return label;
    return '<a class="cl" href="' + escText(ctfdUrl) + '/users/' + encodeURIComponent(id) + '" target="_blank">' + label + '</a>';
  }

  function linkChallenge(name) {
    if (!ctfdLinksEnabled || !ctfdUrl || !name) return escText(name);
    return '<a class="cl" href="' + escText(ctfdUrl) + '/challenges" target="_blank">' + escText(name) + '</a>';
  }

  function fetchJSON(url, cb) {
    fetch(url, { headers: authHeaders() })
      .then(function (r) { return r.json(); })
      .then(cb)
      .catch(function (e) { cb(null, e); });
  }

  // ── Section state ──────────────────────────────────────────────────────────

  var state = {
    alerts:    { page: 0, data: [] },
    instances: { page: 0, data: [] },
    solves:    { page: 0, data: [] },
    attempts:  { page: 0, data: [] },
  };

  // solvedSet: "challenge_name|team_id" → true, derived from allSolves (ctfd_solves-backed)
  var solvedSet = new Set();
  // aliveSet: "challenge_name|team_id" → true for running instances
  var aliveSet = new Set();

  window.sectionPageReset = function(name) {
    state[name].page = 0;
    renderSection(name);
  };

  window.sectionPage = function(name, delta) {
    state[name].page += delta;
    renderSection(name);
  };

  function getLimit(name) {
    return parseInt(document.getElementById(name + '-limit').value) || 0;
  }

  function getChallenge(name) {
    return document.getElementById(name + '-challenge').value;
  }

  function updateChallengeFilter(name, data) {
    var sel = document.getElementById(name + '-challenge');
    var current = sel.value;
    var names = [];
    data.forEach(function (r) {
      if (r.challenge_name && names.indexOf(r.challenge_name) < 0)
        names.push(r.challenge_name);
    });
    names.sort();
    while (sel.options.length > 1) sel.remove(1);
    names.forEach(function (n) {
      var opt = document.createElement('option');
      opt.value = n;
      opt.textContent = n;
      if (n === current) opt.selected = true;
      sel.appendChild(opt);
    });
  }

  function renderSection(name) {
    var s = state[name];
    var challenge = getChallenge(name);
    var limit = getLimit(name);

    var filtered;
    if (name === 'attempts') {
      filtered = attemptsFiltered(s.data, challenge);
    } else if (name === 'instances') {
      filtered = s.data.filter(function (r) {
        if (challenge && r.challenge_name !== challenge) return false;
        if (hideSolved && r.status === 'solved') return false;
        return true;
      });
    } else {
      filtered = s.data.filter(function (r) {
        return !challenge || r.challenge_name === challenge;
      });
    }

    var total = filtered.length;
    var totalPages = (limit > 0) ? Math.max(1, Math.ceil(total / limit)) : 1;
    if (s.page >= totalPages) s.page = totalPages - 1;
    if (s.page < 0) s.page = 0;

    var pageData = (limit > 0)
      ? filtered.slice(s.page * limit, (s.page + 1) * limit)
      : filtered;

    var prevBtn = document.getElementById(name + '-prev');
    var nextBtn = document.getElementById(name + '-next');
    var pageInfo = document.getElementById(name + '-pageinfo');
    if (prevBtn) prevBtn.disabled = (s.page <= 0);
    if (nextBtn) nextBtn.disabled = (s.page >= totalPages - 1);
    if (pageInfo) {
      pageInfo.textContent = limit > 0
        ? 'p.' + (s.page + 1) + '/' + totalPages + ' (' + total + ')'
        : '(' + total + ')';
    }

    var el = document.getElementById(name + '-table');
    switch (name) {
      case 'alerts':    renderAlertsRows(pageData, el); break;
      case 'instances': renderInstancesRows(pageData, el); break;
      case 'solves':    renderSolvesRows(pageData, el); break;
      case 'attempts':  renderAttemptsRows(pageData, el); break;
    }
  }

  // ── Alerts ─────────────────────────────────────────────────────────────────

  function renderAlertsRows(data, el) {
    var badge = document.getElementById('alerts-count-badge');
    badge.textContent = state.alerts.data.length;
    if (data.length === 0) {
      el.innerHTML = '<p class="empty">No sharing alerts detected.</p>'; return;
    }
    var html = '<table class="alert-tbl"><thead><tr>' +
      '<th>Time</th><th>Challenge</th><th>Team (submitter)</th><th>User</th>' +
      '<th>Owner Team</th><th>Correct?</th><th>Submitted Flag</th>' +
      '</tr></thead><tbody>';
    data.forEach(function (r) {
      html += '<tr>' +
        '<td>' + escText(r.timestamp) + '</td>' +
        '<td>' + linkChallenge(r.challenge_name) + '</td>' +
        '<td class="badge-sharing">' + linkTeam(r.team_id, r.team_name) + '</td>' +
        '<td>' + linkUser(r.user_id, r.user_name) + '</td>' +
        '<td>' + (r.owner_team_id !== null ? linkTeam(r.owner_team_id, r.owner_team_name) : '') + '</td>' +
        '<td>' + (r.is_correct ? '<span class="badge-ok">YES</span>' : '<span class="badge-fail">no</span>') + '</td>' +
        '<td>' + escText(r.submitted_flag) + '</td>' +
        '</tr>';
    });
    html += '</tbody></table>';
    el.innerHTML = html;
  }

  function loadAlerts() {
    fetchJSON('/api/v1/admin/attempts?alerts_only=true', function (data, err) {
      if (!Array.isArray(data)) data = [];
      state.alerts.data = data;
      updateChallengeFilter('alerts', data);
      renderSection('alerts');
      document.getElementById('last-refresh').textContent =
        'Last refresh: ' + new Date().toLocaleTimeString();
    });
  }

  // ── Instances ──────────────────────────────────────────────────────────────

  function renderInstancesRows(data, el) {
    var running = state.instances.data.filter(function (r) { return r.status === 'running'; });
    document.getElementById('instances-count').textContent = running.length;

    if (data.length === 0) {
      el.innerHTML = '<p class="empty">No active instances.</p>'; return;
    }
    var html = '<table><thead><tr>' +
      '<th>Challenge</th><th>Team</th><th>User</th><th>Host:Port</th>' +
      '<th>Type</th><th>Status</th><th>Expires At</th><th>Created At</th><th>Action</th>' +
      '</tr></thead><tbody>';
    data.forEach(function (r) {
      var isSolved = r.status === 'solved';
      var rowClass = isSolved ? ' class="row-solved"' : '';
      var stopCall = 'stopInstance(' + JSON.stringify(r.challenge_name) + ',' + Number(r.team_id) + ')';
      var stopAttr = stopCall.replace(/&/g, '&amp;').replace(/"/g, '&quot;');
      var actionCell = isSolved
        ? '<span class="badge-solved">Solved</span>'
        : '<button class="btn-stop" onclick="' + stopAttr + '">Stop</button>';
      html += '<tr' + rowClass + '>' +
        '<td>' + linkChallenge(r.challenge_name) + '</td>' +
        '<td>' + linkTeam(r.team_id, r.team_name) + '</td>' +
        '<td>' + linkUser(r.user_id, r.user_name) + '</td>' +
        '<td>' + escText(r.host) + ':' + escText(r.port) + '</td>' +
        '<td>' + escText(r.connection_type) + '</td>' +
        '<td>' + escText(r.status) + '</td>' +
        '<td>' + escText(r.expires_at) + '</td>' +
        '<td>' + escText(r.created_at) + '</td>' +
        '<td>' + actionCell + '</td>' +
        '</tr>';
    });
    html += '</tbody></table>';
    el.innerHTML = html;
  }

  function loadInstances() {
    fetchJSON('/api/v1/admin/instances', function (data, err) {
      if (!Array.isArray(data)) data = [];
      state.instances.data = data;
      aliveSet = new Set(
        data.filter(function (i) { return i.status === 'running'; })
            .map(function (i) { return i.challenge_name + '|' + String(i.team_id); })
      );
      updateChallengeFilter('instances', data);
      renderSection('instances');
      renderSection('attempts');
    });
  }

  window.stopInstance = function(challengeName, teamId) {
    fetch('/api/v1/plugin/stop', {
      method: 'DELETE',
      headers: authHeaders(),
      body: JSON.stringify({ challenge_name: challengeName, team_id: teamId }),
    }).then(function (r) { return r.json(); })
      .then(function (d) {
        if (d.ok) { loadInstances(); }
        else { alert('Error: ' + (d.error || JSON.stringify(d))); }
      })
      .catch(function (e) { alert('Network error: ' + e.message); });
  };

  window.stopAll = function() {
    var challenge = getChallenge('instances');
    var btn = document.getElementById('instances-stop-all');
    btn.disabled = true;
    btn.textContent = 'Stopping…';

    var names = challenge
      ? [challenge]
      : state.instances.data
          .map(function (r) { return r.challenge_name; })
          .filter(function (n, i, a) { return a.indexOf(n) === i; });

    if (names.length === 0) {
      btn.disabled = false;
      btn.textContent = 'Stop All';
      return;
    }

    var remaining = names.length;
    names.forEach(function (name) {
      fetch('/api/v1/plugin/stop_all', {
        method: 'DELETE',
        headers: authHeaders(),
        body: JSON.stringify({ challenge_name: name }),
      })
        .catch(function () {})
        .finally(function () {
          remaining--;
          if (remaining === 0) {
            btn.disabled = false;
            btn.textContent = 'Stop All';
            loadInstances();
          }
        });
    });
  };

  // ── Solves ─────────────────────────────────────────────────────────────────

  function renderSolvesRows(data, el) {
    document.getElementById('solves-count').textContent = state.solves.data.length;
    if (data.length === 0) {
      el.innerHTML = '<p class="empty">No solves yet.</p>'; return;
    }
    var html = '<table><thead><tr>' +
      '<th>Time</th><th>Challenge</th><th>Team</th><th>User</th>' +
      '</tr></thead><tbody>';
    data.forEach(function (r) {
      html += '<tr>' +
        '<td>' + escText(r.timestamp) + '</td>' +
        '<td>' + linkChallenge(r.challenge_name) + '</td>' +
        '<td class="badge-ok">' + linkTeam(r.team_id, r.team_name) + '</td>' +
        '<td>' + linkUser(r.user_id, r.user_name) + '</td>' +
        '</tr>';
    });
    html += '</tbody></table>';
    el.innerHTML = html;
  }

  function loadSolves() {
    fetchJSON('/api/v1/admin/solves', function (data, err) {
      if (!Array.isArray(data)) data = [];
      state.solves.data = data;
      solvedSet = new Set(data.map(function (s) {
        return s.challenge_name + '|' + String(s.team_id);
      }));
      updateChallengeFilter('solves', data);
      renderSection('solves');
      renderSection('attempts');
    });
  }

  // ── Attempts ───────────────────────────────────────────────────────────────

  function attemptsFiltered(data, challenge) {
    return data.filter(function (r) {
      if (challenge && r.challenge_name !== challenge) return false;
      var key = r.challenge_name + '|' + String(r.team_id);
      var isCorrect = r.is_correct && solvedSet.has(key);
      return isCorrect || r.is_flag_sharing || aliveSet.has(key);
    });
  }

  function renderAttemptsRows(data, el) {
    var challenge = getChallenge('attempts');
    var filtered = attemptsFiltered(state.attempts.data, challenge);
    document.getElementById('attempts-count').textContent = filtered.length;

    if (data.length === 0) {
      el.innerHTML = '<p class="empty">No flag attempts recorded.</p>'; return;
    }
    var html = '<table><thead><tr>' +
      '<th>Time</th><th>Challenge</th><th>Team</th><th>User</th>' +
      '<th>Correct?</th><th>Sharing?</th><th>Owner Team</th><th>Submitted Flag</th>' +
      '</tr></thead><tbody>';
    data.forEach(function (r) {
      var key = r.challenge_name + '|' + String(r.team_id);
      var isCorrect = r.is_correct && solvedSet.has(key);
      html += '<tr>' +
        '<td>' + escText(r.timestamp) + '</td>' +
        '<td>' + linkChallenge(r.challenge_name) + '</td>' +
        '<td>' + linkTeam(r.team_id, r.team_name) + '</td>' +
        '<td>' + linkUser(r.user_id, r.user_name) + '</td>' +
        '<td>' + (isCorrect ? '<span class="badge-ok">YES</span>' : '<span class="badge-fail">no</span>') + '</td>' +
        '<td>' + (r.is_flag_sharing ? '<span class="badge-sharing">SHARING</span>' : '') + '</td>' +
        '<td>' + (r.owner_team_id !== null ? linkTeam(r.owner_team_id, r.owner_team_name) : '') + '</td>' +
        '<td>' + escText(r.submitted_flag) + '</td>' +
        '</tr>';
    });
    html += '</tbody></table>';
    el.innerHTML = html;
  }

  function loadAttempts() {
    fetchJSON('/api/v1/admin/attempts', function (data, err) {
      if (!Array.isArray(data)) data = [];
      state.attempts.data = data;
      updateChallengeFilter('attempts', data);
      renderSection('attempts');
    });
  }

  // ── Boot ───────────────────────────────────────────────────────────────────

  loadAlerts();
  loadInstances();
  loadSolves();
  loadAttempts();

  setInterval(loadAlerts,    15000);
  setInterval(loadInstances, 15000);
  setInterval(loadSolves,    15000);
  setInterval(loadAttempts,  30000);
}());
</script>
</body>
</html>
