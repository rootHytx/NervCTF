name: "Challenge Name"
author: "author"
category: misc
description: |
    Describe the challenge here.

    Connect with: `nc <host> <port>`
value: 100
type: instance
state: visible

instance:
    backend: vagrant
    vagrantfile: /opt/challenges/challenge-name/vagrant
    internal_port: 4000
    connection: nc

    # WARNING: The vagrant backend does not yet inject flags into VMs.
    # Random flags will be generated and registered in CTFd but will NOT
    # reach the VM. Use flag_mode: static with a hardcoded flag instead.
    flag_mode: random
    flag_prefix: "CTF{"
    flag_suffix: "}"
    random_flag_length: 16

    timeout_minutes: 60
    # max_renewals: 2

# Dynamic scoring (optional)
# extra:
#     initial: 500
#     decay: 100
#     minimum: 50

tags:
    - tag1

version: "0.3"
